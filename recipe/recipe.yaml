schema_version: 1

context:
  name: tracerite
  version: "2.5.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/tracerite-${{ version }}.tar.gz
  sha256: 0c86aeb75ea8f4913e555e9edbb6e4832b3dce7e687de568bbd8d5d4fd578d62

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >=${{ python_min }}
    - html5tagger >=2.0.0

tests:
  - python:
      imports:
        - tracerite
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Human-readable HTML tracebacks for Python exceptions
  license: Unlicense
  license_file: LICENSE
  homepage: https://github.com/sanic-org/tracerite

extra:
  recipe-maintainers:
    - thewchan
